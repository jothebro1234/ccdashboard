<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- ── HEADER ─────────────────────────────────────────────── -->
    <header class="header">
        <div class="live-badge">
            <span class="live-pulse"></span>
            <span class="live-text">LIVE</span>
        </div>

        <div class="header-main">
            <div class="trophy">🏆</div>
            <h1 class="title">
                <span class="org-name" id="org-name">VOLUNTEER</span>
                <span class="title-sub">LEADERBOARD</span>
            </h1>
        </div>

        <div class="refresh-widget">
            <div class="ring-wrap">
                <svg viewBox="0 0 36 36">
                    <circle class="ring-track" cx="18" cy="18" r="15.9"/>
                    <circle class="ring-fill" id="ring-fill" cx="18" cy="18" r="15.9" stroke-dasharray="100 100"/>
                </svg>
                <span id="countdown" class="ring-count">60</span>
            </div>
            <span class="refresh-lbl">REFRESH</span>
        </div>
    </header>

    <!-- ── STATS ROW ───────────────────────────────────────────── -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon-wrap sky">👥</div>
            <div>
                <div class="stat-num sky" id="stat-volunteers">—</div>
                <div class="stat-lbl">Volunteers</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap purple">⏱️</div>
            <div>
                <div class="stat-num purple" id="stat-hours">—</div>
                <div class="stat-lbl">Total Hours</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap ocean">📅</div>
            <div>
                <div class="stat-num ocean" id="stat-events">—</div>
                <div class="stat-lbl">Events Logged</div>
            </div>
        </div>
    </div>

    <!-- ── TABS ────────────────────────────────────────────────── -->
    <div class="tabs">
        <button class="tab active" data-cat="hours">⏱ Most Hours</button>
        <button class="tab" data-cat="events">🎯 Most Events</button>
    </div>

    <!-- ── PODIUM (top 3) ──────────────────────────────────────── -->
    <div class="podium-grid" id="podium"></div>

    <!-- ── LIST (rank 4+) ─────────────────────────────────────── -->
    <div class="list-section">
        <div class="list-header">
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="search" type="text" placeholder="Search volunteer...">
            </div>
            <span class="list-count" id="list-count"></span>
        </div>
        <div id="leaderboard-list"></div>
    </div>

    <footer class="footer">
        Updated <span id="last-updated">—</span> · Synced from Google Sheets
    </footer>

</div>

<!-- ── VOLUNTEER PROFILE MODAL ─────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true">

        <button class="modal-close" id="modal-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>

        <div class="modal-head">
            <div class="modal-avatar" id="modal-avatar"></div>
            <div class="modal-identity">
                <div class="modal-name" id="modal-name"></div>
                <div class="modal-discord" id="modal-discord"></div>
            </div>
        </div>

        <div class="modal-stats">
            <div class="modal-stat">
                <div class="modal-stat-val sky" id="modal-hours">0</div>
                <div class="modal-stat-lbl">Total Hours</div>
            </div>
            <div class="modal-divider"></div>
            <div class="modal-stat">
                <div class="modal-stat-val purple" id="modal-ev-count">0</div>
                <div class="modal-stat-lbl">Events Attended</div>
            </div>
        </div>

        <div class="modal-section-title">Events History</div>
        <div class="modal-event-list" id="modal-event-list"></div>

    </div>
</div>

<!-- ── LOADING OVERLAY ──────────────────────────────────────── -->
<div class="loading-overlay" id="loading">
    <div class="loader-inner">
        <div class="loader-ring"></div>
        <div class="loader-text">Loading Leaderboard</div>
    </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
