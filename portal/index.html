<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curio Crate — Volunteer Portal</title>
    <link rel="icon" type="image/png" href="../cclogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portal.css">
    <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>

<!-- Animated background -->
<div class="bg-wrap" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="grid-overlay"></div>
</div>

<!-- AUTH GATE (shown until authenticated) -->
<div class="auth-gate" id="auth-gate">
    <div class="auth-card-wrap">
        <img src="../mascot1.png" alt="Curie the Capybara" class="auth-mascot" onerror="this.style.display='none'">
        <div class="auth-card">
            <img src="../cclogo.png" alt="" class="auth-logo-wm" aria-hidden="true" onerror="this.style.display='none'">
            <div class="auth-org">CURIO CRATE</div>
            <div class="auth-title" id="auth-title">Volunteer Portal</div>
            <div id="auth-body">
                <!-- Populated by portal.js based on ?vol= or ?role= param -->
            </div>
        </div>
    </div>
</div>

<!-- PORTAL SHELL (hidden until auth) -->
<div class="portal-shell" id="portal-shell" style="display:none">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sb-brand" id="sb-brand" style="cursor:pointer" title="Home">
            <img src="../cclogo.png" alt="" class="sb-logo" onerror="this.style.display='none'">
            <div class="sb-brand-text">
                <div class="sb-org">CURIO CRATE</div>
                <div class="sb-portal-lbl">VOLUNTEER PORTAL</div>
            </div>
        </div>

        <nav class="sb-nav" id="sb-nav"></nav>

        <div class="sb-footer">
            <div class="sb-user" id="sb-user"></div>
            <a href="https://forms.gle/xmkdUKGEEg9Xh9R76" target="_blank" class="sb-lb-link" title="Change your preferences">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                Change your preferences
            </a>
            <button class="sb-first-time" id="sb-first-time" type="button">✨ First Time?</button>
        </div>
    </aside>

    <!-- Main content -->
    <main class="portal-main" id="portal-main">
        <div class="view-root" id="view-root"></div>
    </main>

</div>

<!-- Mobile sidebar toggle -->
<button class="mob-toggle" id="mob-toggle" aria-label="Toggle menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="20" height="20">
        <line x1="3" y1="8"  x2="21" y2="8"/>
        <line x1="3" y1="16" x2="21" y2="16"/>
    </svg>
</button>

<!-- Toast -->
<div id="toast-wrap"></div>

<!-- Instagram FAB -->
<a class="insta-fab" id="insta-fab" href="https://www.instagram.com/ckf.curiocrate/" target="_blank" rel="noopener noreferrer" title="Follow Curio Crate on Instagram" aria-label="Follow us on Instagram">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="5"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
    </svg>
</a>

<!-- Loading overlay -->
<div class="portal-loading hidden pl-init" id="portal-loading">
    <!-- Layers -->
    <div class="pl-bg"></div>
    <div class="pl-vignette"></div>
    <div class="pl-scan" aria-hidden="true"></div>
    <!-- Floating particles -->
    <div class="pl-particles" aria-hidden="true">
        <div class="pl-p" style="--x:7%;--dur:4.2s;--d:.2s;--s:2px"></div>
        <div class="pl-p" style="--x:19%;--dur:5.5s;--d:.8s;--s:3px"></div>
        <div class="pl-p" style="--x:33%;--dur:4.8s;--d:1.4s;--s:2px"></div>
        <div class="pl-p" style="--x:50%;--dur:3.9s;--d:.3s;--s:4px"></div>
        <div class="pl-p" style="--x:64%;--dur:5.2s;--d:1.0s;--s:2px"></div>
        <div class="pl-p" style="--x:78%;--dur:4.4s;--d:0s;--s:3px"></div>
        <div class="pl-p" style="--x:90%;--dur:5.0s;--d:1.6s;--s:2px"></div>
        <div class="pl-p" style="--x:42%;--dur:6.0s;--d:.6s;--s:2px"></div>
    </div>
    <!-- Main content -->
    <div class="pl-inner">
        <!-- Logo + orbital rings -->
        <div class="pl-logo-wrap">
            <div class="pl-orbit"></div>
            <div class="pl-orbit pl-orbit-2"></div>
            <img src="../cclogo.png" class="pl-logo" alt="Curio Crate" onerror="this.style.display='none'">
        </div>
        <!-- Letter-by-letter title -->
        <div class="pl-org" aria-label="CURIO CRATE">
            <span style="--i:0">C</span><span style="--i:1">U</span><span style="--i:2">R</span><span style="--i:3">I</span><span style="--i:4">O</span><span class="pl-sp">&nbsp;</span><span style="--i:5">C</span><span style="--i:6">R</span><span style="--i:7">A</span><span style="--i:8">T</span><span style="--i:9">E</span>
        </div>
        <div class="pl-tagline">VOLUNTEER PORTAL</div>
        <div class="pl-sep"></div>
        <div class="pl-bar-wrap">
            <div class="pl-bar-glow"></div>
            <div class="pl-bar-fill"></div>
        </div>
        <div class="pl-status">INITIALIZING</div>
    </div>
</div>

<script src="../config.js"></script>
<script src="portal.js"></script>
</body>
</html>
